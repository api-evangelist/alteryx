components:
  securitySchemes:
    oauth2:
      type: oauth2
      description: >-
        OAuth 2.0 authentication using API Access Key and API Access Secret
        obtained from the Server User Interface under the Keys section.
      flows:
        clientCredentials:
          tokenUrl: https://{serverHostname}/webapi/oauth2/token
          scopes: {}
  parameters:
    workflowId:
      name: workflowId
      in: path
      required: true
      description: Unique identifier of the workflow
      schema:
        type: string
    scheduleId:
      name: scheduleId
      in: path
      required: true
      description: Unique identifier of the schedule
      schema:
        type: string
    userId:
      name: userId
      in: path
      required: true
      description: Unique identifier of the user
      schema:
        type: string
    credentialId:
      name: credentialId
      in: path
      required: true
      description: Unique identifier of the credential
      schema:
        type: string
    collectionId:
      name: collectionId
      in: path
      required: true
      description: Unique identifier of the collection
      schema:
        type: string
  schemas:
    WorkflowSummary:
      type: object
      description: Summary representation of an Alteryx workflow
      properties:
        id:
          type: string
          description: Unique workflow identifier
        sourceAppId:
          type: string
          description: Source application identifier for migration tracking
        name:
          type: string
          description: Name of the workflow
        ownerId:
          type: string
          description: ID of the workflow owner
        dateCreated:
          type: string
          format: date-time
          description: Date the workflow was created (ISO 8601)
        publishedVersionNumber:
          type: integer
          description: Version number of the published version
        isAmp:
          type: boolean
          description: Whether the workflow uses AMP engine
        executionMode:
          type: string
          enum:
            - Safe
            - SemiSafe
            - Standard
          description: Execution mode for the workflow
    WorkflowDetail:
      type: object
      description: Detailed representation of an Alteryx workflow including versions
      properties:
        id:
          type: string
          description: Unique workflow identifier
        sourceAppId:
          type: string
          description: Source application identifier
        dateCreated:
          type: string
          format: date-time
          description: Date the workflow was created
        runCount:
          type: integer
          description: Total number of times the workflow has been executed
        versions:
          type: array
          description: List of workflow versions
          items:
            $ref: '#/components/schemas/WorkflowVersion'
        name:
          type: string
          description: Name of the workflow
        ownerId:
          type: string
          description: ID of the workflow owner
        workerTag:
          type: string
          description: Worker tag for execution routing
        districtTags:
          type: array
          items:
            type: string
          description: District tags assigned to the workflow
        comments:
          type: string
          description: Comments about the workflow
        isPublic:
          type: boolean
          description: Whether the workflow is publicly accessible
        isReadyForMigration:
          type: boolean
          description: Whether the workflow is ready for migration
        publishedVersionId:
          type: string
          description: ID of the currently published version
        othersMayDownload:
          type: boolean
          description: Whether other users may download the workflow
        othersCanViewHistory:
          type: boolean
          description: Whether other users can view execution history
        othersCanExecute:
          type: boolean
          description: Whether other users can execute the workflow
        hasPrivateDataExemption:
          type: boolean
          description: Whether the workflow has a private data exemption
    WorkflowVersion:
      type: object
      description: A specific version of a workflow
      properties:
        versionId:
          type: string
          description: Unique version identifier
        versionNumber:
          type: integer
          description: Sequential version number
        dateCreated:
          type: string
          format: date-time
          description: Date the version was created
        uploadSource:
          type: string
          description: Source from which the version was uploaded
        uploadDate:
          type: string
          format: date-time
          description: Date the version was uploaded
        packageWorkflowType:
          type: string
          description: Type of workflow in the package
        published:
          type: boolean
          description: Whether this version is the published version
        comments:
          type: string
          description: Comments about this version
        runDisabled:
          type: boolean
          description: Whether execution is disabled for this version
        executionMode:
          type: string
          enum:
            - Safe
            - SemiSafe
            - Standard
        workflowCredentialType:
          type: string
          enum:
            - Default
            - Required
            - Specific
        credentialId:
          type: string
          description: Credential ID if workflowCredentialType is Specific
        hasPrivateDataExemption:
          type: boolean
        othersMayDownload:
          type: boolean
        othersCanViewHistory:
          type: boolean
        details:
          $ref: '#/components/schemas/WorkflowVersionDetails'
    WorkflowVersionDetails:
      type: object
      description: Metadata details for a workflow version
      properties:
        isAmp:
          type: boolean
          description: Whether the version uses AMP engine
        fileName:
          type: string
          description: Name of the workflow file
        author:
          type: string
          description: Author of the workflow
        copyright:
          type: string
          description: Copyright information
        description:
          type: string
          description: Description of the workflow
        name:
          type: string
          description: Display name of the workflow
        noOutputFilesMessage:
          type: string
          description: Message shown when no output files are generated
        outputMessage:
          type: string
          description: Message shown with output files
        url:
          type: string
          format: uri
          description: Related URL
        urlText:
          type: string
          description: Display text for the related URL
    UpdateWorkflowContract:
      type: object
      description: Contract for updating an existing workflow
      required:
        - name
        - versionId
        - ownerId
        - workerTag
        - districtTags
        - comments
      properties:
        name:
          type: string
          description: Updated workflow name
        versionId:
          type: string
          description: Version ID to update
        makePublished:
          type: boolean
          description: Whether to make the specified version published
        ownerId:
          type: string
          description: Updated owner ID
        workerTag:
          type: string
          description: Updated worker tag
        districtTags:
          type: array
          items:
            type: string
          description: Updated district tags
        comments:
          type: string
          description: Updated comments
        isPublic:
          type: boolean
        isReadyForMigration:
          type: boolean
        othersMayDownload:
          type: boolean
        othersCanExecute:
          type: boolean
        executionMode:
          type: string
          enum:
            - Safe
            - SemiSafe
            - Standard
        hasPrivateDataExemption:
          type: boolean
        workflowCredentialType:
          type: string
          enum:
            - Default
            - Required
            - Specific
        credentialId:
          type: string
    WorkflowQuestion:
      type: object
      description: An analytic app question (input parameter)
      properties:
        name:
          type: string
          description: Name of the question
        questionType:
          type: string
          description: Type of the question input
        description:
          type: string
          description: Description of the question
        value:
          type: string
          description: Default value
        multiple:
          type: boolean
          description: Whether multiple selections are allowed
        items:
          type: array
          description: Available options for the question
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
    ScheduleSummary:
      type: object
      description: Summary representation of a schedule
      properties:
        id:
          type: string
          description: Unique schedule identifier
        name:
          type: string
          description: Name of the schedule
        workflowId:
          type: string
          description: ID of the associated workflow
        ownerId:
          type: string
          description: ID of the schedule owner
        runDateTime:
          type: string
          format: date-time
          description: Next scheduled run date and time
        timeZone:
          type: string
          description: Time zone for the schedule
    ScheduleDetail:
      type: object
      description: Detailed representation of a schedule
      properties:
        id:
          type: string
          description: Unique schedule identifier
        name:
          type: string
          description: Name of the schedule
        workflowId:
          type: string
          description: ID of the associated workflow
        versionId:
          type: string
          description: Specific workflow version ID
        ownerId:
          type: string
          description: ID of the schedule owner
        runDateTime:
          type: string
          format: date-time
          description: Next scheduled run date and time
        comment:
          type: string
          description: Comments about the schedule
        enabled:
          type: boolean
          description: Whether the schedule is active
        priority:
          type: string
          enum:
            - Low
            - Medium
            - High
            - Critical
          description: Execution priority
        workerTag:
          type: string
          description: Worker tag for execution routing
        status:
          type: string
          description: Current status of the schedule
        credentialId:
          type: string
          description: Credential used for execution
        creationTime:
          type: string
          format: date-time
          description: When the schedule was created
        lastRunTime:
          type: string
          format: date-time
          description: When the schedule last executed
        state:
          type: string
          description: Current state of the schedule
        runCount:
          type: integer
          description: Total number of times the schedule has executed
        iteration:
          $ref: '#/components/schemas/ScheduleIteration'
        frequency:
          type: string
          description: Human-readable frequency description
        lastError:
          type: string
          description: Last error message if any
        cpuName:
          type: string
          description: Name of the worker node
        lastModifiedId:
          type: string
          description: ID of the user who last modified the schedule
        lastModifiedDate:
          type: string
          format: date-time
          description: Date of last modification
        canEdit:
          type: boolean
          description: Whether the current user can edit this schedule
        timeZone:
          type: string
          description: Time zone for the schedule
        questions:
          type: array
          description: Analytic app question values
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
    ScheduleIteration:
      type: object
      description: Schedule iteration configuration defining when and how often a schedule runs
      required:
        - iterationType
        - startTime
      properties:
        iterationType:
          type: string
          enum:
            - Once
            - Hourly
            - Daily
            - Weekly
            - Monthly
            - Custom
            - Cron
          description: The frequency pattern for the schedule
        startTime:
          type: string
          format: date-time
          description: Start date and time (ISO 8601, must be in the future)
        endTime:
          type: string
          format: date-time
          description: End date and time (ISO 8601)
        hourlyContract:
          type: object
          description: Configuration for hourly iteration
          properties:
            hours:
              type: integer
              description: Number of hours between executions
            minutes:
              type: integer
              description: Number of minutes between executions
        dailyContract:
          type: object
          description: Configuration for daily iteration
          properties:
            runOnlyWorkWeek:
              type: boolean
              description: Whether to run only on workdays (Monday-Friday)
        weeklyContract:
          type: object
          description: Configuration for weekly iteration
          properties:
            daysOfWeek:
              type: array
              items:
                type: string
              description: Days of the week to run
        monthlyContract:
          type: object
          description: Configuration for monthly iteration
          properties:
            simpleDayOfMonth:
              type: boolean
              description: Whether to use a simple day-of-month pattern
            dayOfMonth:
              type: string
              description: Day of the month to run
            occurrence:
              type: string
              description: Occurrence pattern (First, Second, Third, Fourth, Last)
            dayOfWeek:
              type: integer
              description: Day of the week (0=Sunday, 6=Saturday)
        customContract:
          type: object
          description: Configuration for custom iteration
          properties:
            daysOfMonth:
              type: array
              items:
                type: integer
              description: Specific days of the month to run
            months:
              type: array
              items:
                type: integer
              description: Specific months to run (1-12)
        cronContract:
          type: object
          description: Configuration for cron-based iteration
          properties:
            cronExpression:
              type: string
              description: >-
                Cron expression with 5 mandatory fields: minute, hour,
                day-of-month, month, day-of-week
    CreateScheduleContract:
      type: object
      description: Contract for creating a new schedule
      required:
        - workflowId
        - iteration
      properties:
        workflowId:
          type: string
